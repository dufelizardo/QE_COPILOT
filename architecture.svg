<svg width="900" viewBox="0 0 900 1080" xmlns="http://www.w3.org/2000/svg" role="img">
<title>QE Copilot — Clean Architecture</title>
<desc>Diagrama estrutural em camadas: Entry (Streamlit, FastAPI, Robot Framework), Adapters (Orchestrator, Agent, PromptBuilder, ValidatorChain, ResponseBuilder), Domain (Entities, Ports, Use Cases) e Infrastructure (B3GPT, RAG, VectorStores).</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .layer-label { font-size: 11px; fill: #999; font-weight: 500; letter-spacing: 0.5px; }
    .box-title { font-size: 13px; font-weight: 600; }
    .box-sub   { font-size: 11px; }
    /* Entry */
    .c-entry-fill   { fill: #f5f5f5; stroke: #ccc; }
    .c-entry-title  { fill: #333; }
    .c-entry-sub    { fill: #666; }
    /* Adapters purple */
    .c-purple-fill  { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple-title { fill: #26215C; }
    .c-purple-sub   { fill: #534AB7; }
    /* Adapters teal */
    .c-teal-fill    { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal-title   { fill: #04342C; }
    .c-teal-sub     { fill: #0F6E56; }
    /* Domain amber */
    .c-amber-fill   { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber-title  { fill: #412402; }
    .c-amber-sub    { fill: #854F0B; }
    /* Domain coral */
    .c-coral-fill   { fill: #FAECE7; stroke: #993C1D; }
    .c-coral-title  { fill: #4A1B0C; }
    .c-coral-sub    { fill: #993C1D; }
    /* Infrastructure blue */
    .c-blue-fill    { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue-title   { fill: #042C53; }
    .c-blue-sub     { fill: #185FA5; }
    /* Red */
    .c-red-fill     { fill: #FCEBEB; stroke: #A32D2D; }
    .c-red-title    { fill: #501313; }
    .c-red-sub      { fill: #A32D2D; }
    /* Gray */
    .c-gray-fill    { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray-title   { fill: #2C2C2A; }
    .c-gray-sub     { fill: #5F5E5A; }
    /* Background bands */
    .band-entry  { fill: #fafafa; }
    .band-adapt  { fill: #f7f6ff; }
    .band-domain { fill: #fffbf2; }
    .band-infra  { fill: #f0f6ff; }
    /* Arrows */
    .arr-main { stroke: #555; stroke-width: 1.5; fill: none; }
    .arr-dash { stroke: #aaa; stroke-width: 1; fill: none; stroke-dasharray: 5 3; }
    /* Legend */
    .legend-text { font-size: 11px; fill: #555; }
  </style>
</defs>

<!-- ── Background bands ─────────────────────────────────── -->
<rect x="0" y="0"   width="900" height="145" class="band-entry"/>
<rect x="0" y="145" width="900" height="290" class="band-adapt"/>
<rect x="0" y="435" width="900" height="200" class="band-domain"/>
<rect x="0" y="635" width="900" height="195" class="band-infra"/>
<rect x="0" y="830" width="900" height="120" fill="#f8f8f8"/>

